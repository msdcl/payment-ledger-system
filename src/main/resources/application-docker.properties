# =============================================================================
# Docker Profile - Overrides for containerized runtime
# =============================================================================
#
# SPRING PROFILES EXPLAINED:
# When you set SPRING_PROFILES_ACTIVE=docker, Spring Boot loads:
#   1. application.properties        (base config - always loaded)
#   2. application-docker.properties (this file - overrides the base)
#
# Only settings that DIFFER from the base need to be here. Everything else
# is inherited from application.properties.
#
# WHY THIS PATTERN?
# The same JAR artifact runs in every environment. The only thing that changes
# is which profile is active. This is a core DevOps principle:
# "Build once, deploy everywhere" - never rebuild for a different environment.
#
# REAL-WORLD PROFILES YOU'LL SEE:
# - application-local.properties    (developer's machine)
# - application-docker.properties   (Docker Compose)
# - application-staging.properties  (staging environment)
# - application-prod.properties     (production - often uses env vars instead)
# =============================================================================

# Database - use Docker service name instead of localhost
spring.datasource.url=jdbc:postgresql://postgres:5432/payment_ledger

# Redis - use Docker service name
spring.data.redis.host=redis

# Kafka - use Docker internal listener port (29092, not 9092)
# 29092 is the PLAINTEXT listener for container-to-container communication
# 9092 is the PLAINTEXT_HOST listener for host machine access
spring.kafka.bootstrap-servers=kafka:29092

# Connection pool - slightly smaller for dev containers (save memory)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5

# Show health details without auth in local Docker (convenient for debugging)
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# More verbose logging in Docker for learning/debugging
logging.level.com.flagship.payment_ledger=DEBUG
