# =============================================================================
# Kafka StatefulSet (KRaft mode - No ZooKeeper!)
# =============================================================================
#
# WHY KRAFT MODE?
# In docker-compose, we used Kafka + ZooKeeper (traditional setup).
# Here we use KRaft (Kafka Raft) mode - ZooKeeper-free. This is:
# - Simpler: One less service to manage
# - Faster: Fewer moving parts, faster startup
# - The future: ZooKeeper will be fully removed from Kafka
#
# WHY STATEFULSET FOR KAFKA?
# Kafka brokers store data (message logs) on disk. Each broker has its own
# data that must persist across restarts. Same reasons as PostgreSQL:
# stable identity, stable storage, ordered startup.
#
# REAL-WORLD: In production, you'd run 3+ Kafka brokers for fault tolerance.
# Or use managed Kafka: AWS MSK, Confluent Cloud, Azure Event Hubs.
# Running Kafka in K8s is common but complex - the Strimzi operator helps.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: payment-ledger
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: messaging
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/component: messaging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: messaging
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - name: kafka
              containerPort: 9092
          env:
            # KRaft mode configuration (no ZooKeeper)
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            # Advertised listeners: how OTHER pods reach this Kafka broker
            # For headless service + StatefulSet, pods are addressable via:
            # kafka-0.kafka.payment-ledger.svc.cluster.local
            # But we also create a regular ClusterIP service called "kafka"
            # which clients can use directly.
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-0.kafka.payment-ledger.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Single broker settings
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            # Required for KRaft mode
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command:
                - kafka-topics
                - --bootstrap-server
                - localhost:9092
                - --list
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# Headless Service for Kafka (required by StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: payment-ledger
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: messaging
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: messaging
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
