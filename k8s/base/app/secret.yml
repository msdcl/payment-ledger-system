# =============================================================================
# Secret - Sensitive Configuration Data
# =============================================================================
#
# WHAT: Secrets store sensitive data like passwords, API keys, TLS certificates.
# They're similar to ConfigMaps but with special handling:
# - Stored in etcd (K8s database)
# - Can be encrypted at rest (if configured)
# - Access can be restricted via RBAC
# - Not printed in `kubectl describe pod` output
#
# IMPORTANT SECURITY REALITY:
# K8s Secrets are base64-ENCODED, NOT encrypted by default!
# Anyone with namespace access can decode them:
#   kubectl get secret db-credentials -o jsonpath='{.data.password}' | base64 -d
#
# For real security in production, use:
# - Sealed Secrets (Bitnami) - encrypted in git, decrypted in cluster
# - External Secrets Operator - pulls from AWS Secrets Manager, Vault, etc.
# - HashiCorp Vault - dedicated secrets management
#
# WHY WE STILL USE K8S SECRETS:
# Even though base64 isn't encryption, Secrets provide:
# 1. Intent: Marks data as sensitive (documented, auditable)
# 2. RBAC: Separate access control from ConfigMaps
# 3. Mount options: tmpfs mounts (never written to disk on nodes)
# 4. Integration: Works with external secret managers
#
# GENERATING BASE64 VALUES:
#   echo -n 'postgres' | base64    → cG9zdGdyZXM=
#   echo -n 'my-password' | base64 → bXktcGFzc3dvcmQ=
# The -n flag is critical! Without it, echo adds a newline character.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: payment-ledger
  labels:
    app.kubernetes.io/name: payment-ledger
    app.kubernetes.io/component: secrets
# `Opaque` is the default type - arbitrary key-value pairs
# Other types: kubernetes.io/tls (TLS certs), kubernetes.io/dockerconfigjson (registry creds)
type: Opaque
data:
  # Base64-encoded values (echo -n 'postgres' | base64)
  DB_USERNAME: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=
