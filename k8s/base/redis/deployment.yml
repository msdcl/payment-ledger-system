# =============================================================================
# Redis Deployment
# =============================================================================
#
# WHY DEPLOYMENT (NOT STATEFULSET) FOR REDIS?
# In your app, Redis is used as a CACHE for idempotency keys. If the cache
# is lost, the app falls back to database lookups (you built this in Phase 3
# of the payment-ledger). So Redis data is "nice to have" but not critical.
#
# For caching use cases → Deployment (simpler, cache can be rebuilt)
# For Redis as primary datastore → StatefulSet (data must persist)
#
# REAL-WORLD: Most teams run Redis Sentinel or Redis Cluster for production.
# Or they use managed Redis: AWS ElastiCache, GCP Memorystore, Azure Cache.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: payment-ledger
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: payment-ledger
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  # ClusterIP (default) - only reachable from within the cluster
  # Redis doesn't need external access
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: redis
